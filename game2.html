<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft rd-132211 - Steve Multiplayer Edition</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #80a0ff;
            font-family: monospace;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 16px;
            height: 16px;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: white;
            mix-blend-mode: difference;
        }
        #crosshair::before { top: 7px; left: 0; width: 16px; height: 2px; }
        #crosshair::after { top: 0; left: 7px; width: 2px; height: 16px; }
    </style>
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="crosshair"></div>

    <script type="module">
        // --- Firebase 連携設定 ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
        import {
            getDatabase,
            ref,
            set,
            onValue,
            remove,
            onDisconnect
        } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAKf-iBYV_X3aJfpK2pfkBPFVoNcPC1lSU",
            authDomain: "my-ktty.firebaseapp.com",
            databaseURL: "https://my-ktty-default-rtdb.firebaseio.com",
            projectId: "my-ktty",
            storageBucket: "my-ktty.firebasestorage.app",
            messagingSenderId: "313123611276",
            appId: "1:313123611276:web:a625bdb2844f5864c551a9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const playerId = crypto.randomUUID();

        const otherPlayers = {};

        function updatePlayerNetwork(x, y, z, yaw) {
            set(ref(db, "players/" + playerId), { x, y, z, yaw });
        }

        onDisconnect(ref(db, "players/" + playerId)).remove();

        // --- Three.js 基本設定 ---
        const WIDTH = window.innerWidth;
        const HEIGHT = window.innerHeight;
        
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x80a0ff);
        scene.fog = new THREE.Fog(0x80a0ff, 60, 160);

        const camera = new THREE.PerspectiveCamera(75, WIDTH / HEIGHT, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: false }); 
        renderer.setSize(WIDTH, HEIGHT);
        document.body.appendChild(renderer.domElement);

        // --- 光源 ---
        const ambientLight = new THREE.AmbientLight(0xbbbbbb); 
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
        directionalLight.position.set(0.6, 1.0, 0.4).normalize();
        scene.add(directionalLight);

        // --- テクスチャ・マテリアル生成ロジック ---
        function createFaithfulTexture(type) {
            const canvas = document.createElement('canvas');
            canvas.width = 16; canvas.height = 16;
            const ctx = canvas.getContext('2d');
            const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

            if (type === 'grass_top') {
                for(let x=0; x<16; x++) {
                    for(let y=0; y<16; y++) {
                        let c = rand(105, 145);
                        ctx.fillStyle = `rgb(${Math.floor(c*0.65)}, ${c}, ${Math.floor(c*0.35)})`;
                        ctx.fillRect(x, y, 1, 1);
                    }
                }
            } else if (type === 'dirt') {
                for(let x=0; x<16; x++) {
                    for(let y=0; y<16; y++) {
                        let c = rand(85, 115);
                        ctx.fillStyle = `rgb(${c}, ${Math.floor(c*0.72)}, ${Math.floor(c*0.5)})`;
                        ctx.fillRect(x, y, 1, 1);
                    }
                }
            } else if (type === 'grass_side') {
                for(let x=0; x<16; x++) {
                    let grassDepth = 4 + (x % 2 === 0 ? 1 : 0) + (x % 3 === 0 ? 1 : 0);
                    if(x === 5 || x === 11) grassDepth += 1;
                    for(let y=0; y<16; y++) {
                        if (y < grassDepth) {
                            let c = rand(105, 145);
                            ctx.fillStyle = `rgb(${Math.floor(c*0.65)}, ${c}, ${Math.floor(c*0.35)})`;
                        } else {
                            let c = rand(85, 115);
                            ctx.fillStyle = `rgb(${c}, ${Math.floor(c*0.72)}, ${Math.floor(c*0.5)})`;
                        }
                        ctx.fillRect(x, y, 1, 1);
                    }
                }
            } else if (type === 'stone') {
                for(let x=0; x<16; x++) {
                    for(let y=0; y<16; y++) {
                        let c = rand(100, 135);
                        if(Math.random() < 0.14) c -= 30;
                        if(Math.random() < 0.08) c += 20;
                        ctx.fillStyle = `rgb(${c}, ${c}, ${c})`;
                        ctx.fillRect(x, y, 1, 1);
                    }
                }
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.magFilter = THREE.NearestFilter; 
            texture.minFilter = THREE.NearestFilter;
            return texture;
        }

        const textures = {
            grassTop: createFaithfulTexture('grass_top'),
            grassSide: createFaithfulTexture('grass_side'),
            dirt: createFaithfulTexture('dirt'),
            stone: createFaithfulTexture('stone')
        };

        const materials = {
            grass: [
                new THREE.MeshLambertMaterial({ map: textures.grassSide }),
                new THREE.MeshLambertMaterial({ map: textures.grassSide }),
                new THREE.MeshLambertMaterial({ map: textures.grassTop }), 
                new THREE.MeshLambertMaterial({ map: textures.dirt }),      
                new THREE.MeshLambertMaterial({ map: textures.grassSide }),
                new THREE.MeshLambertMaterial({ map: textures.grassSide })
            ],
            stone: Array(6).fill(new THREE.MeshLambertMaterial({ map: textures.stone }))
        };

        // スキンテクスチャ読み込み
        const textureLoader = new THREE.TextureLoader();
        const steveTexture = textureLoader.load('steve.png');
        steveTexture.magFilter = THREE.NearestFilter;
        steveTexture.minFilter = THREE.NearestFilter;

        // 指定のUV矩形からThree.js用のマテリアル（6面分）を切り出す汎用関数
        function createCubeMaterials(tex, u, v, w, h, d) {
            const faces = [
                { x: u + d + w,     y: v + d,     w: w, h: h, name: 'right' },
                { x: u,             y: v + d,     w: w, h: h, name: 'left' },
                { x: u + d,         y: v,         w: w, h: d, name: 'top' },
                { x: u + d + w,     y: v,         w: w, h: d, name: 'bottom' },
                { x: u + d,         y: v + d,     w: w, h: h, name: 'front' },
                { x: u + d + w + d, y: v + d,     w: w, h: h, name: 'back' }
            ];

            return faces.map(f => {
                const t = tex.clone();
                t.needsUpdate = true;
                t.repeat.set(f.w / 64, f.h / 64);
                t.offset.set(f.x / 64, 1 - (f.y + f.h) / 64);
                return new THREE.MeshLambertMaterial({ map: t, transparent: true });
            });
        }

        // --- ワールド生成 (80x80) ---
        const worldSize = 80;
        const worldHeight = 6;
        const blockGeo = new THREE.BoxGeometry(1, 1, 1);
        
        const worldData = {}; 
        const maxBlocksPerType = worldSize * worldSize * worldHeight * 2;

        const instancedMeshes = {
            grass: new THREE.InstancedMesh(blockGeo, materials.grass, maxBlocksPerType),
            stone: new THREE.InstancedMesh(blockGeo, materials.stone, maxBlocksPerType)
        };
        scene.add(instancedMeshes.grass);
        scene.add(instancedMeshes.stone);

        function updateWorldRender() {
            let counts = { grass: 0, stone: 0 };
            const dummy = new THREE.Object3D();

            for (let key in worldData) {
                let block = worldData[key];
                dummy.position.set(block.x, block.y, block.z);
                dummy.updateMatrix();
                
                let type = block.type;
                let mesh = instancedMeshes[type];
                if (mesh) {
                    mesh.setMatrixAt(counts[type], dummy.matrix);
                    counts[type]++;
                }
            }

            instancedMeshes.grass.count = counts.grass;
            instancedMeshes.stone.count = counts.stone;
            instancedMeshes.grass.instanceMatrix.needsUpdate = true;
            instancedMeshes.stone.instanceMatrix.needsUpdate = true;
        }

        function addBlockData(x, y, z, type) {
            const key = `${x},${y},${z}`;
            if (worldData[key]) return;
            worldData[key] = { x, y, z, type };
        }

        function removeBlockData(x, y, z) {
            const key = `${x},${y},${z}`;
            if (worldData[key]) {
                delete worldData[key];
                updateWorldRender();
            }
        }

        for (let x = -worldSize/2; x < worldSize/2; x++) {
            for (let z = -worldSize/2; z < worldSize/2; z++) {
                for (let y = -worldHeight; y <= 0; y++) {
                    let type = (y === 0) ? 'grass' : 'stone';
                    addBlockData(x, y, z, type);
                }
            }
        }
        updateWorldRender();

        // --- 立体スティーブモデルの組み立て ---
        function createSteveMesh() {
            const steveGroup = new THREE.Group();

            // 各パーツのマテリアルをクラシックスキンのUV仕様からマッピング
            const headMats = createCubeMaterials(steveTexture, 0, 0, 8, 8, 8);
            const bodyMats = createCubeMaterials(steveTexture, 16, 16, 8, 12, 4);
            const armMats  = createCubeMaterials(steveTexture, 40, 16, 4, 12, 4);
            const legMats  = createCubeMaterials(steveTexture, 0, 16, 4, 12, 4);

            // 1ブロック＝1メートル基準のスケール変換
            const headGeo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
            const bodyGeo = new THREE.BoxGeometry(0.5, 0.75, 0.25);
            const armGeo  = new THREE.BoxGeometry(0.25, 0.75, 0.25);
            const legGeo  = new THREE.BoxGeometry(0.25, 0.75, 0.25);

            const head = new THREE.Mesh(headGeo, headMats);
            head.position.set(0, 1.425, 0);

            const body = new THREE.Mesh(bodyGeo, bodyMats);
            body.position.set(0, 0.825, 0);

            const leftArm = new THREE.Mesh(armGeo, armMats);
            leftArm.position.set(0.375, 0.825, 0);

            const rightArm = new THREE.Mesh(armGeo, armMats);
            rightArm.position.set(-0.375, 0.825, 0);

            const leftLeg = new THREE.Mesh(legGeo, legMats);
            leftLeg.position.set(0.125, 0.375, 0);

            const rightLeg = new THREE.Mesh(legGeo, legMats);
            rightLeg.position.set(-0.125, 0.375, 0);

            steveGroup.add(head, body, leftArm, rightArm, leftLeg, rightLeg);
            return steveGroup;
        }

        // ネットワーク経由の他プレイヤー同期
        onValue(ref(db, "players"), (snapshot) => {
            const playersData = snapshot.val() || {};
            
            for (let id in otherPlayers) {
                if (!playersData[id]) {
                    scene.remove(otherPlayers[id]);
                    delete otherPlayers[id];
                }
            }

            for (let id in playersData) {
                if (id === playerId) continue;

                const p = playersData[id];
                if (!otherPlayers[id]) {
                    otherPlayers[id] = createSteveMesh();
                    scene.add(otherPlayers[id]);
                }

                otherPlayers[id].position.set(p.x, p.y, p.z);
                otherPlayers[id].rotation.y = p.yaw + Math.PI; // 正面を向かせるための補正
            }
        });

        // --- プレイヤー物理・カメラ制御 ---
        camera.rotation.order = "YXZ";
        let yaw = 0, pitch = 0;

        const player = {
            position: new THREE.Vector3(0, 4, 5),
            velocity: new THREE.Vector3(0, 0, 0),
            width: 0.6,
            height: 1.8,
            eyeHeight: 1.6,
            onGround: false
        };

        camera.position.copy(player.position).y += player.eyeHeight;

        document.body.addEventListener('click', () => {
            document.body.requestPointerLock();
        });

        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body) {
                yaw -= e.movementX * 0.002;
                pitch -= e.movementY * 0.002;
                pitch = Math.max(-Math.PI / 2 + 0.01, Math.min(Math.PI / 2 - 0.01, pitch));
                camera.rotation.x = pitch;
                camera.rotation.y = yaw;
            }
        });

        let keys = { KeyW: false, KeyA: false, KeyS: false, KeyD: false, Space: false, ShiftLeft: false };
        let currentSelectedBlock = 'grass';

        window.addEventListener('keydown', (e) => {
            if (e.code in keys) keys[e.code] = true;
            if (e.code === 'Space') keys.Space = true;
            if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') keys.ShiftLeft = true;

            if (e.code === 'Digit1') currentSelectedBlock = 'grass';
            if (e.code === 'Digit2') currentSelectedBlock = 'stone';
        });

        window.addEventListener('keyup', (e) => {
            if (e.code in keys) keys[e.code] = false;
            if (e.code === 'Space') keys.Space = false;
            if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') keys.ShiftLeft = false;
        });

        // --- AABB 衝突判定 ---
        function checkCollision(pos) {
            const margin = 0.001;
            const minX = pos.x - player.width / 2 + margin;
            const maxX = pos.x + player.width / 2 - margin;
            const minY = pos.y + margin;
            const maxY = pos.y + player.height - margin;
            const minZ = pos.z - player.width / 2 + margin;
            const maxZ = pos.z + player.width / 2 - margin;

            const startX = Math.floor(minX);
            const endX = Math.floor(maxX);
            const startY = Math.floor(minY);
            const endY = Math.floor(maxY);
            const startZ = Math.floor(minZ);
            const endZ = Math.floor(maxZ);

            for (let x = startX; x <= endX; x++) {
                for (let y = startY; y <= endY; y++) {
                    for (let z = startZ; z <= endZ; z++) {
                        if (worldData[`${x},${y},${z}`]) {
                            return true; 
                        }
                    }
                }
            }
            return false;
        }

        // --- ブロックの破壊と設置 ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2(0, 0);

        window.addEventListener('mousedown', (e) => {
            if (document.pointerLockElement !== document.body) return;

            raycaster.setFromCamera(mouse, camera);
            
            let targets = [];
            const raycastTargetGeo = new THREE.BoxGeometry(1,1,1);
            const raycastTargetMat = new THREE.MeshBasicMaterial({ visible: false });
            
            for(let key in worldData) {
                let b = worldData[key];
                let m = new THREE.Mesh(raycastTargetGeo, raycastTargetMat);
                m.position.set(b.x, b.y, b.z);
                m.updateMatrixWorld();
                m.userData = { x: b.x, y: b.y, z: b.z };
                targets.push(m);
            }

            const intersects = raycaster.intersectObjects(targets);

            if (intersects.length > 0 && intersects[0].distance < 6) {
                const hit = intersects[0];
                const bp = hit.object.userData;

                if (e.button === 0) { 
                    removeBlockData(bp.x, bp.y, bp.z);
                } else if (e.button === 2) { 
                    const normal = hit.face.normal.clone();
                    const nx = Math.round(bp.x + normal.x);
                    const ny = Math.round(bp.y + normal.y);
                    const nz = Math.round(bp.z + normal.z);
                    
                    const pMinX = Math.floor(player.position.x - player.width/2);
                    const pMaxX = Math.floor(player.position.x + player.width/2);
                    const pMinY = Math.floor(player.position.y);
                    const pMaxY = Math.floor(player.position.y + player.height);
                    const pMinZ = Math.floor(player.position.z - player.width/2);
                    const pMaxZ = Math.floor(player.position.z + player.width/2);

                    if (!(nx >= pMinX && nx <= pMaxX && ny >= pMinY && ny <= pMaxY && nz >= pMinZ && nz <= pMaxZ)) {
                        addBlockData(nx, ny, nz, currentSelectedBlock);
                        updateWorldRender();
                    }
                }
            }
            targets.forEach(t => t.geometry.dispose());
        });

        window.addEventListener('contextmenu', e => e.preventDefault());

        // --- メインループ ---
        const clock = new THREE.Clock();
        const GRAVITY = 22.0;   
        const JUMP_FORCE = 7.5; 
        let networkTimer = 0;

        function animate() {
            requestAnimationFrame(animate);

            const delta = Math.min(clock.getDelta(), 0.1); 

            if (document.pointerLockElement === document.body) {
                let currentSpeed = keys.ShiftLeft ? 6.0 : 4.0;

                const front = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw).normalize();
                const side = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw).normalize();

                let moveVec = new THREE.Vector3();
                if (keys.KeyW) moveVec.add(front);
                if (keys.KeyS) moveVec.sub(front);
                if (keys.KeyD) moveVec.add(side);
                if (keys.KeyA) moveVec.sub(side); 

                if (keys.KeyW || keys.KeyA || keys.KeyS || keys.KeyD) {
                    moveVec.normalize().multiplyScalar(currentSpeed);
                    player.velocity.x = moveVec.x;
                    player.velocity.z = moveVec.z;
                } else {
                    player.velocity.x *= 0.2; 
                    player.velocity.z *= 0.2;
                }

                player.velocity.y -= GRAVITY * delta;

                if (keys.Space && player.onGround) {
                    player.velocity.y = JUMP_FORCE;
                    player.onGround = false;
                }

                let nextPos = player.position.clone();
                nextPos.x += player.velocity.x * delta;
                if (!checkCollision(nextPos)) {
                    player.position.x = nextPos.x;
                } else {
                    player.velocity.x = 0;
                }

                nextPos = player.position.clone();
                nextPos.z += player.velocity.z * delta;
                if (!checkCollision(nextPos)) {
                    player.position.z = nextPos.z;
                } else {
                    player.velocity.z = 0;
                }

                player.onGround = false;
                nextPos = player.position.clone();
                nextPos.y += player.velocity.y * delta;
                
                if (!checkCollision(nextPos)) {
                    player.position.y = nextPos.y;
                } else {
                    if (player.velocity.y < 0) {
                        player.onGround = true;
                        player.position.y = Math.round(player.position.y * 100) / 100;
                    }
                    player.velocity.y = 0;
                }

                if (player.position.y < -30) {
                    player.position.set(0, 4, 5);
                    player.velocity.set(0, 0, 0);
                }

                camera.position.copy(player.position);
                camera.position.y += player.eyeHeight;

                networkTimer += delta;
                if (networkTimer > 0.033) {
                    updatePlayerNetwork(player.position.x, player.position.y, player.position.z, yaw);
                    networkTimer = 0;
                }
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
